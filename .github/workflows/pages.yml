name: Deploy landing page to GitHub Pages

# The app itself deploys to Cloudflare Pages (virtual-lanes.pages.dev);
# this publishes the static landing/ folder to GitHub Pages, with the
# MkDocs build from the gh-pages branch kept available under /docs/.
# NB: pushing new docs to gh-pages does NOT retrigger this workflow —
# run it manually (workflow_dispatch) to refresh /docs/.
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _gh-pages

      - name: Assemble site (landing at root, docs under /docs/)
        run: |
          mkdir -p site/docs
          cp -r landing/* site/
          rsync -a --exclude '.git' _gh-pages/ site/docs/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
