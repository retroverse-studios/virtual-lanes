name: Deploy landing page to GitHub Pages

# The app itself deploys to Cloudflare Pages (virtual-lanes.pages.dev);
# this publishes just the static landing/ folder to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - id: deployment
        uses: actions/deploy-pages@v4
